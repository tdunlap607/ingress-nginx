name: Create Controller Release

on:
  schedule:
    - cron: '0 0 * * 1' # every Monday at 00:00 UTC
  workflow_dispatch:

permissions: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: "1.26"
          cache: "false"
          check-latest: "true"

      - name: Build
        run: go build ./...

  release:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Octo-STS
        uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        id: octo-sts
        with:
          scope: chainguard-forks/ingress-nginx
          identity: release

      - name: Check if any changes since last release
        id: check
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          git fetch --tags
          TAG=$(git tag --points-at HEAD)
          if [ -z "$TAG" ]; then
            echo "No tag points at HEAD, checking if changes warrant a release."

            # Get the last release tag (controller-v* pattern)
            LAST_TAG=$(git tag --list 'controller-v*' --sort=-v:refname | head -1)

            if [ -n "$LAST_TAG" ]; then
              echo "Last release tag: $LAST_TAG"

              # Get all changed files since last tag
              CHANGED_FILES=$(git diff --name-only "$LAST_TAG"..HEAD)

              # Only release if changes include .go files, go.mod, or go.sum
              RELEASE_WORTHY_CHANGES=$(echo "$CHANGED_FILES" | grep -E '(\.go$|^go\.mod$|^go\.sum$)' || true)

              if [ -z "$RELEASE_WORTHY_CHANGES" ]; then
                echo "No Go source files, go.mod, or go.sum changed since last release. Skipping release."
                echo "need_release=no" >> $GITHUB_OUTPUT
              else
                echo "Found release-worthy changes since last release:"
                echo "$RELEASE_WORTHY_CHANGES"
                echo "need_release=yes" >> $GITHUB_OUTPUT
              fi
            else
              echo "No previous tags found. Creating first release."
              echo "need_release=yes" >> $GITHUB_OUTPUT
            fi
          else
            RELEASE=$(gh release view "$TAG" --json tagName --jq '.tagName' || echo "none")
            if [ "$RELEASE" == "$TAG" ]; then
              echo "A release exists for tag $TAG, which has the latest changes, so no need for a new tag or release."
              echo "need_release=no" >> $GITHUB_OUTPUT
            else
              echo "Tag $TAG exists, but no release is associated. Need a new release."
              echo "need_release=yes" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Generate release tag
        if: steps.check.outputs.need_release == 'yes'
        id: tag
        run: |
          # Get the last controller-v* tag, or fall back to Chart.yaml appVersion
          LAST_TAG=$(git tag --list 'controller-v*' --sort=-v:refname | head -1)

          if [ -n "$LAST_TAG" ]; then
            # Extract version from controller-v{major}.{minor}.{patch}
            VERSION="${LAST_TAG#controller-v}"
          else
            # No tags yet, use Chart.yaml appVersion as the base version
            VERSION=$(grep '^appVersion:' charts/ingress-nginx/Chart.yaml | awk '{print $2}')
          fi

          # Parse major.minor.patch
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          # Bump patch version
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="controller-v${MAJOR}.${MINOR}.${NEW_PATCH}"

          echo "Bumping version: controller-v${VERSION} -> ${NEW_TAG}"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.check.outputs.need_release == 'yes'
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "${{ steps.tag.outputs.tag }}" \
            --generate-notes
